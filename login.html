<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Social Media</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="auth-container">
    <div class="auth-box">
      <h1>🌐 Social Connect</h1>
      <p class="tagline">Connect with friends and share your moments</p>
      
      <!-- Login Form -->
      <div id="loginForm" class="form-section active">
        <h2>Login</h2>
        <form onsubmit="handleLogin(event)">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <input type="password" id="loginPassword" placeholder="Password" required>
          <button type="submit" class="btn-primary">Login</button>
        </form>
        <p class="switch-text">
          Don't have an account? 
          <span onclick="showSignup()" class="link">Sign up</span>
        </p>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="form-section">
        <h2>Sign Up</h2>
        <form onsubmit="handleSignup(event)">
          <input type="text" id="signupUsername" placeholder="Username" required>
          <input type="email" id="signupEmail" placeholder="Email" required>
          <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" minlength="6" required>
          <button type="submit" class="btn-primary">Sign Up</button>
        </form>
        <p class="switch-text">
          Already have an account? 
          <span onclick="showLogin()" class="link">Login</span>
        </p>
      </div>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000';

    function showSignup() {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('signupForm').classList.add('active');
      document.getElementById('message').textContent = '';
    }

    function showLogin() {
      document.getElementById('signupForm').classList.remove('active');
      document.getElementById('loginForm').classList.add('active');
      document.getElementById('message').textContent = '';
    }

    async function handleSignup(e) {
      e.preventDefault();
      const username = document.getElementById('signupUsername').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;

      try {
        const response = await fetch(`${API_URL}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (data.success) {
          showMessage('Account created! Please login.', 'success');
          setTimeout(() => showLogin(), 2000);
        } else {
          showMessage(data.error || 'Signup failed', 'error');
        }
      } catch (error) {
        showMessage('Server error. Please try again.', 'error');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('currentUser', JSON.stringify(data));
          showMessage('Login successful!', 'success');
          setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
          showMessage(data.error || 'Invalid credentials', 'error');
        }
      } catch (error) {
        showMessage('Server error. Please try again.', 'error');
      }
    }

    function showMessage(msg, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = msg;
      messageEl.className = `message ${type}`;
      messageEl.style.display = 'block';
    }
  </script>

</body>
</html>
